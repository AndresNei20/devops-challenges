services:
  app:
    build:
      context: ./ToDoApp
      dockerfile: Dockerfile
    container_name: todoapp
    ports:
      - "3000:3000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: todo_user
      MYSQL_PASSWORD: todo_password
      MYSQL_DB: todo_db
    depends_on:
      - mysql

  mysql:
    image: mysql:5.7
    container_name: todo-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: todo_db
      MYSQL_USER: todo_user
      MYSQL_PASSWORD: todo_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: